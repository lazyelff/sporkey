<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="200" height="200">
  <!-- Background circle -->
  <circle cx="300" cy="300" r="280" fill="#f5f5f5"/>
  
  <!-- Red arc top -->
  <path d="M 150 250 Q 300 120 450 250" stroke="#ff4444" stroke-width="30" fill="none" stroke-linecap="round"/>
  
  <!-- Dark blue arc bottom -->
  <path d="M 150 350 Q 300 480 450 350" stroke="#1a2e5e" stroke-width="30" fill="none" stroke-linecap="round"/>
  
  <!-- Sporkey text -->
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#1a2e5e" text-anchor="middle" letter-spacing="2" font-style="italic">sporkey</text>
  
  <!-- Runner figure (top right) -->
  <g transform="translate(420, 240)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="12" fill="#1a2e5e"/>
    <!-- Body -->
    <line x1="0" y1="-15" x2="0" y2="10" stroke="#1a2e5e" stroke-width="8"/>
    <!-- Left arm back -->
    <line x1="0" y1="-5" x2="-20" y2="-15" stroke="#1a2e5e" stroke-width="6"/>
    <!-- Right arm forward -->
    <line x1="0" y1="-5" x2="20" y2="-25" stroke="#1a2e5e" stroke-width="6"/>
    <!-- Left leg forward -->
    <line x1="0" y1="10" x2="15" y2="35" stroke="#1a2e5e" stroke-width="6"/>
    <!-- Right leg back -->
    <line x1="0" y1="10" x2="-10" y2="30" stroke="#1a2e5e" stroke-width="6"/>
  </g>
</svg>