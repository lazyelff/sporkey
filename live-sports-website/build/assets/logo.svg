<svg viewBox="0 0 615 615" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="615" height="615" fill="#1a4d2e"/>
  
  <!-- Vertical stripes for field effect -->
  <g id="stripes" opacity="0.6">
    <rect x="0" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="35" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="70" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="105" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="140" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="175" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="210" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="245" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="280" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="315" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="350" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="385" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="420" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="455" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="490" y="45" width="30" height="525" fill="#2d6e40"/>
    <rect x="525" y="45" width="30" height="525" fill="#1a4d2e"/>
    <rect x="560" y="45" width="30" height="525" fill="#2d6e40"/>
  </g>
  
  <!-- Field lines -->
  <line x1="307.5" y1="45" x2="307.5" y2="570" stroke="white" stroke-width="3"/>
  <line x1="0" y1="45" x2="615" y2="45" stroke="white" stroke-width="3"/>
  <line x1="0" y1="307.5" x2="615" y2="307.5" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="570" x2="615" y2="570" stroke="white" stroke-width="3"/>
  
  <!-- Center circle -->
  <circle cx="307.5" cy="307.5" r="80" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="307.5" cy="307.5" r="5" fill="white"/>
  
  <!-- Goal boxes left -->
  <rect x="0" y="150" width="60" height="315" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Goal boxes right -->
  <rect x="555" y="150" width="60" height="315" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Runner figure -->
  <g id="runner">
    <!-- Head -->
    <circle cx="520" cy="200" r="18" fill="white"/>
    <!-- Body -->
    <line x1="520" y1="220" x2="520" y2="290" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Left arm -->
    <line x1="520" y1="235" x2="480" y2="190" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="520" y1="235" x2="560" y2="210" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="520" y1="290" x2="480" y2="350" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="520" y1="290" x2="550" y2="340" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Ball/Soccer decoration -->
  <circle cx="450" cy="320" r="15" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 440 320 Q 450 310 460 320" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- SPORTKEY Text -->
  <text x="307.5" y="450" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="2" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-style: italic;">SPORTKEY</text>
  
  <!-- Decorative swoosh lines -->
  <path d="M 100 280 Q 200 240 300 260" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>
  <path d="M 350 260 Q 420 220 500 260" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>
</svg>